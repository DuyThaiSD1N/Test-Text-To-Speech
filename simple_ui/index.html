<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Agent - Simple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
        }

        .container {
            background: white;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px 30px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .header h1 {
            font-size: 28px;
            color: white;
            margin: 0;
        }

        .status {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 14px;
            color: white;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: #f9fafb;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #667eea;
        }

        .message.agent .avatar {
            background: #10b981;
        }

        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
        }

        .message.user .bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.agent .bubble {
            background: white;
            color: #1f2937;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .thinking {
            display: inline-flex;
            gap: 4px;
        }

        .thinking span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .thinking span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .thinking span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        .input-area {
            padding: 20px 30px;
            border-top: 2px solid #f0f0f0;
            background: white;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-reset {
            background: #10b981;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
        }

        .btn-record {
            background: #f59e0b;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .btn-record.recording {
            background: #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }
        }

        .welcome {
            text-align: center;
            padding: 60px 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        .welcome h2 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Voice Agent</h1>
            <div class="status" id="status">Sẵn sàng</div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcome">
                <h2>🎙️ Chào mừng đến với Voice Agent</h2>
                <p>Nhập thông tin khách hàng để bắt đầu</p>

                <div style="max-width: 500px; margin: 20px auto;">
                    <div class="form-group">
                        <label>Xưng hô:</label>
                        <input type="text" id="custTitle" placeholder="Anh/Chị/Cô/Chú" value="Anh">
                    </div>
                    <div class="form-group">
                        <label>Tên khách hàng:</label>
                        <input type="text" id="custName" placeholder="Nguyễn Văn A" value="Thái">
                    </div>
                    <div class="form-group">
                        <label>Biển số xe:</label>
                        <input type="text" id="custPlate" placeholder="30G-123.45" value="30G-12345">
                    </div>
                    <div class="form-group">
                        <label>Ngày hết hạn BH:</label>
                        <input type="date" id="custExpire" value="2024-01-01">
                    </div>

                    <div class="controls">
                        <button class="btn-success" onclick="startCall()"
                            style="flex: 1; padding: 15px; font-size: 18px;">
                            📞 Bắt đầu cuộc gọi
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-row">
                <button class="btn-record" id="recordBtn" onclick="toggleRecording()" title="Nhấn để nói">
                    🎤
                </button>
                <input type="text" id="messageInput" placeholder="Nhập tin nhắn hoặc nhấn 🎤 để nói..."
                    onkeypress="handleKeyPress(event)" oninput="handleTyping()">
                <button class="btn-primary" onclick="sendMessage()">Gửi</button>
                <button class="btn-danger" onclick="clearChat()">Xóa</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let isProcessing = false;
        let audioContext = null;
        let audioQueue = [];
        let isPlayingQueue = false;

        // Recording state
        let isRecording = false;
        let mediaRecorder = null;
        let audioStream = null;

        const chatArea = document.getElementById('chatArea');
        const welcome = document.getElementById('welcome');
        const messageInput = document.getElementById('messageInput');
        const status = document.getElementById('status');
        const recordBtn = document.getElementById('recordBtn');

        // ═══════════════════════════════════════════════════════════════════════
        // AUDIO FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                console.log('[Audio] Context initialized');
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        function pcmToFloat32(pcm16) {
            const float32 = new Float32Array(pcm16.length);
            for (let i = 0; i < pcm16.length; i++) {
                float32[i] = pcm16[i] / 32768.0;
            }
            return float32;
        }

        async function playAudioChunk(base64Data, sampleRate) {
            return new Promise((resolve) => {
                try {
                    initAudio();

                    const binaryString = atob(base64Data);
                    const len = binaryString.length;
                    const bytes = new Uint8Array(len);
                    for (let i = 0; i < len; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }

                    const pcm16 = new Int16Array(bytes.buffer);
                    const float32 = pcmToFloat32(pcm16);

                    const audioBuffer = audioContext.createBuffer(1, float32.length, sampleRate);
                    audioBuffer.getChannelData(0).set(float32);

                    const source = audioContext.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(audioContext.destination);
                    source.onended = resolve;
                    source.start(0);
                } catch (e) {
                    console.error('[Audio] Play error:', e);
                    resolve();
                }
            });
        }

        async function processAudioQueue() {
            if (isPlayingQueue || audioQueue.length === 0) return;

            isPlayingQueue = true;
            console.log('[Audio] Processing queue:', audioQueue.length, 'chunks');

            while (audioQueue.length > 0) {
                const chunk = audioQueue.shift();
                await playAudioChunk(chunk.audio, chunk.sampleRate || 8000);
            }

            isPlayingQueue = false;
            console.log('[Audio] Queue complete');

            // Thông báo server rằng audio đã phát xong
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'audio_playback_ended' }));
                console.log('[Audio] Notified server: playback ended');
            }
        }

        function enqueueAudio(msg) {
            audioQueue.push(msg);
            processAudioQueue();
        }

        // ═══════════════════════════════════════════════════════════════════════
        // WEBSOCKET
        // ═══════════════════════════════════════════════════════════════════════
        function connect() {
            // Auto-detect protocol (ws:// for http, wss:// for https)
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${location.host}/ws/agent`;
            console.log('[WS] Connecting to:', wsUrl);

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('[WS] ✅ Connected');
                setStatus('✅ Đã kết nối', '#10b981');
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                console.log('[WS] Received:', msg.type);
                handleMessage(msg);
            };

            ws.onerror = (err) => {
                console.error('[WS] Error:', err);
                setStatus('❌ Lỗi kết nối', '#ef4444');
            };

            ws.onclose = () => {
                console.log('[WS] Closed');
                setStatus('⚠️ Mất kết nối', '#f59e0b');
                ws = null;
            };
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'recording_started':
                    console.log('[Record] Server confirmed recording started');
                    break;

                case 'transcript':
                    console.log('[Transcript]', msg.isFinal ? 'Final:' : 'Partial:', msg.text);
                    if (msg.isFinal) {
                        addUserBubble(msg.text);
                    }
                    break;

                case 'thinking':
                    setStatus('💭 Đang suy nghĩ...', '#667eea');
                    addThinkingBubble();
                    break;

                case 'agent_response_start':
                    console.log('[Agent] Response starting...');
                    setStatus('💬 Đang trả lời...', '#10b981');
                    isProcessing = false;  // Agent đã bắt đầu trả lời, cho phép gửi message mới
                    // Thinking bubble sẽ được update bởi tokens
                    break;

                case 'agent_response_token':
                    console.log('[Agent] Token:', msg.token);
                    appendToLastBubble(msg.token);
                    break;

                case 'agent_response':
                    console.log('[Agent] Response:', msg.text.substring(0, 50) + '...');
                    setStatus('✅ Đã kết nối', '#10b981');
                    updateLastBubble(msg.text);
                    isProcessing = false;
                    break;

                case 'audio_response':
                    console.log('[Audio] 🔊 Received chunk');
                    enqueueAudio(msg);
                    break;

                case 'audio_end':
                    console.log('[Audio] ✅ Playback complete');
                    isProcessing = false;  // Cho phép gửi message tiếp theo
                    break;

                case 'call_ended':
                    console.log('[Call] Ended:', msg.reason);

                    if (msg.reason === 'silence_timeout') {
                        setStatus('📞 Cuộc gọi đã kết thúc', '#f59e0b');
                        // Hiển thị thông báo
                        const notice = document.createElement('div');
                        notice.className = 'message agent';
                        notice.innerHTML = `
                            <div class="avatar">ℹ️</div>
                            <div class="bubble" style="background: #fef3c7; color: #92400e;">
                                Cuộc gọi đã kết thúc do không có phản hồi.
                            </div>
                        `;
                        chatArea.appendChild(notice);
                        scrollToBottom();
                    } else if (msg.reason === 'farewell') {
                        setStatus('👋 Cuộc gọi đã kết thúc', '#10b981');
                    }

                    // Lock input và hiện nút reset
                    lockChatInput();
                    break;

                case 'error':
                    console.error('[Agent] Error:', msg.message);
                    setStatus('❌ Lỗi', '#ef4444');
                    alert('Lỗi: ' + msg.message);
                    removeThinkingBubble();
                    isProcessing = false;
                    break;
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UI FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════
        function setStatus(text, color) {
            status.textContent = text;
            // Status color is now handled by CSS backdrop-filter
            // Keep text white for better contrast
        }

        function hideWelcome() {
            if (welcome) welcome.style.display = 'none';
        }

        function addUserBubble(text) {
            hideWelcome();
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `
                <div class="avatar">👤</div>
                <div class="bubble">${escapeHtml(text)}</div>
            `;
            chatArea.appendChild(div);
            scrollToBottom();
        }

        function addThinkingBubble() {
            hideWelcome();
            const div = document.createElement('div');
            div.className = 'message agent thinking-message';
            div.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="bubble">
                    <div class="thinking">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatArea.appendChild(div);
            scrollToBottom();
        }

        function updateLastBubble(text) {
            const thinkingMsg = chatArea.querySelector('.thinking-message');
            if (thinkingMsg) {
                thinkingMsg.className = 'message agent';
                thinkingMsg.querySelector('.bubble').innerHTML = escapeHtml(text);
            } else {
                // Nếu không có thinking bubble, tìm bubble cuối cùng
                const lastAgentMsg = chatArea.querySelector('.message.agent:last-of-type');
                if (lastAgentMsg) {
                    lastAgentMsg.querySelector('.bubble').innerHTML = escapeHtml(text);
                } else {
                    // Tạo mới nếu không có
                    const div = document.createElement('div');
                    div.className = 'message agent';
                    div.innerHTML = `
                        <div class="avatar">🤖</div>
                        <div class="bubble">${escapeHtml(text)}</div>
                    `;
                    chatArea.appendChild(div);
                }
            }
            scrollToBottom();
        }

        function appendToLastBubble(token) {
            const thinkingMsg = chatArea.querySelector('.thinking-message');
            if (thinkingMsg) {
                // Convert thinking bubble to normal bubble on first token
                thinkingMsg.className = 'message agent';
                thinkingMsg.querySelector('.bubble').innerHTML = escapeHtml(token);
            } else {
                // Append to last agent bubble
                const lastAgentMsg = chatArea.querySelector('.message.agent:last-of-type');
                if (lastAgentMsg) {
                    const bubble = lastAgentMsg.querySelector('.bubble');
                    bubble.innerHTML += escapeHtml(token);
                } else {
                    // Create new bubble if none exists
                    const div = document.createElement('div');
                    div.className = 'message agent';
                    div.innerHTML = `
                        <div class="avatar">🤖</div>
                        <div class="bubble">${escapeHtml(token)}</div>
                    `;
                    chatArea.appendChild(div);
                }
            }
            scrollToBottom();
        }

        function removeThinkingBubble() {
            const thinkingMsg = chatArea.querySelector('.thinking-message');
            if (thinkingMsg) thinkingMsg.remove();
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ═══════════════════════════════════════════════════════════════════════
        // RECORDING FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════
        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            try {
                console.log('[Record] Starting...');

                // Initialize audio context
                initAudio();

                // Request microphone access
                audioStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        channelCount: 1,
                        sampleRate: 16000,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });

                // Create MediaRecorder
                mediaRecorder = new MediaRecorder(audioStream, {
                    mimeType: 'audio/webm;codecs=opus'
                });

                const audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    console.log('[Record] Stopped, processing...');

                    // Convert to PCM and send to server
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await processAudioBlob(audioBlob);
                };

                // Start recording
                mediaRecorder.start(100); // Collect data every 100ms
                isRecording = true;
                recordBtn.classList.add('recording');
                recordBtn.textContent = '⏹️';
                setStatus('🎤 Đang ghi âm...', '#ef4444');

                // Send audio_start to server
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'audio_start' }));
                }

                console.log('[Record] ✅ Started');

            } catch (error) {
                console.error('[Record] Error:', error);
                alert('Không thể truy cập microphone: ' + error.message);
            }
        }

        function stopRecording() {
            if (!isRecording || !mediaRecorder) return;

            console.log('[Record] Stopping...');

            isRecording = false;
            recordBtn.classList.remove('recording');
            recordBtn.textContent = '🎤';
            setStatus('⏳ Đang xử lý...', '#f59e0b');

            mediaRecorder.stop();

            // Stop all tracks
            if (audioStream) {
                audioStream.getTracks().forEach(track => track.stop());
                audioStream = null;
            }
        }

        async function processAudioBlob(blob) {
            try {
                console.log('[Audio] Processing blob, size:', blob.size);

                // Convert WebM to PCM using Web Audio API
                const arrayBuffer = await blob.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                // Resample to 8000 Hz (ASR expects 8kHz)
                const targetSampleRate = 8000;
                const resampled = resampleAudio(audioBuffer, targetSampleRate);

                // Convert to PCM16 (Int16Array)
                const pcm16 = float32ToPCM16(resampled);

                // Send to server in chunks
                const chunkSize = 1600; // 100ms at 8kHz * 2 bytes
                for (let i = 0; i < pcm16.length; i += chunkSize) {
                    const chunk = pcm16.slice(i, i + chunkSize);
                    const base64 = arrayBufferToBase64(chunk.buffer);

                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            type: 'audio_chunk',
                            audio: base64
                        }));
                    }
                }

                // Send audio_end
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'audio_end' }));
                }

                console.log('[Audio] ✅ Sent to server');

            } catch (error) {
                console.error('[Audio] Processing error:', error);
                setStatus('❌ Lỗi xử lý audio', '#ef4444');
            }
        }

        function resampleAudio(audioBuffer, targetSampleRate) {
            const sourceRate = audioBuffer.sampleRate;
            const sourceData = audioBuffer.getChannelData(0);

            if (sourceRate === targetSampleRate) {
                return sourceData;
            }

            const ratio = sourceRate / targetSampleRate;
            const newLength = Math.round(sourceData.length / ratio);
            const result = new Float32Array(newLength);

            for (let i = 0; i < newLength; i++) {
                const srcIndex = i * ratio;
                const srcIndexFloor = Math.floor(srcIndex);
                const srcIndexCeil = Math.min(srcIndexFloor + 1, sourceData.length - 1);
                const t = srcIndex - srcIndexFloor;

                result[i] = sourceData[srcIndexFloor] * (1 - t) + sourceData[srcIndexCeil] * t;
            }

            return result;
        }

        function float32ToPCM16(float32Array) {
            const pcm16 = new Int16Array(float32Array.length);
            for (let i = 0; i < float32Array.length; i++) {
                const s = Math.max(-1, Math.min(1, float32Array[i]));
                pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return pcm16;
        }

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        // ═══════════════════════════════════════════════════════════════════════
        // ACTIONS
        // ═══════════════════════════════════════════════════════════════════════
        let typingTimer = null;
        let lastTypingTime = 0;

        function handleTyping() {
            // Gửi typing indicator khi user đang gõ
            if (ws && ws.readyState === WebSocket.OPEN) {
                const now = Date.now();

                // Gửi typing event mỗi 1 giây (throttle)
                if (now - lastTypingTime > 1000) {
                    ws.send(JSON.stringify({ type: 'typing' }));
                    console.log('[Typing] Indicator sent');
                    lastTypingTime = now;
                }
            }
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isProcessing) return;

            console.log('[Send] Message:', text);
            messageInput.value = '';
            addUserBubble(text);
            isProcessing = true;

            // Initialize audio on user interaction
            initAudio();

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                connect();
                await new Promise(resolve => setTimeout(resolve, 1000));
            }

            ws.send(JSON.stringify({
                type: 'text_input',
                text: text
            }));
        }

        async function startCall() {
            console.log('[Call] Starting');
            hideWelcome();
            isProcessing = true;

            // Initialize audio on user interaction
            initAudio();

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                connect();
                await new Promise(resolve => setTimeout(resolve, 1000));
            }

            const data = {
                title: document.getElementById('custTitle').value,
                name: document.getElementById('custName').value,
                plate: document.getElementById('custPlate').value,
                expire: document.getElementById('custExpire').value
            };

            console.log('[Call] Data:', data);
            ws.send(JSON.stringify({
                type: 'init_call',
                data: data
            }));
        }

        function clearChat() {
            chatArea.innerHTML = '';
            chatArea.appendChild(welcome);
            welcome.style.display = 'block';

            // Clear audio queue và stop playback
            audioQueue = [];
            isPlayingQueue = false;

            // Stop audio context nếu đang phát
            if (audioContext && audioContext.state === 'running') {
                audioContext.suspend();
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'clear_history' }));
            }

            // Unlock input
            unlockChatInput();
        }

        function lockChatInput() {
            console.log('[UI] Locking chat input');
            const inputArea = document.querySelector('.input-area');
            inputArea.innerHTML = `
                <div style="text-align: center;">
                    <button class="btn-reset" onclick="resetChat()">
                        🔄 Bắt đầu cuộc gọi mới
                    </button>
                </div>
            `;
        }

        function unlockChatInput() {
            console.log('[UI] Unlocking chat input');
            const inputArea = document.querySelector('.input-area');
            inputArea.innerHTML = `
                <div class="input-row">
                    <button class="btn-record" id="recordBtn" onclick="toggleRecording()" title="Nhấn để nói">
                        🎤
                    </button>
                    <input type="text" id="messageInput" placeholder="Nhập tin nhắn hoặc nhấn 🎤 để nói..."
                        onkeypress="handleKeyPress(event)" oninput="handleTyping()">
                    <button class="btn-primary" onclick="sendMessage()">Gửi</button>
                    <button class="btn-danger" onclick="clearChat()">Xóa</button>
                </div>
            `;
        }

        function resetChat() {
            console.log('[UI] Resetting chat');
            clearChat();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            } else {
                // Gửi typing indicator khi user đang gõ
                handleTyping();
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════════════════════
        window.onload = () => {
            console.log('[Init] 🚀 Voice Agent loaded');
            connect();
        };
    </script>
</body>

</html>
