<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Agent — AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="bg-grid"></div>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-orb"></div>
                <span>Voice <strong>Agent</strong></span>
            </div>
            <button id="clear-btn" class="btn-clear" title="Xóa lịch sử">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6"/><path d="M14,11v6"/><path d="M9,6V4h6v2"/>
                </svg>
                Xóa hội thoại
            </button>
        </header>

        <!-- Chat area -->
        <main class="chat-area" id="chat-area">
            <div class="welcome-msg" id="welcome-msg">
                <div class="welcome-icon">🎙️</div>
                <h2>Xin chào! Tôi là Voice Agent</h2>
                <p>Nhấn giữ nút mic và nói chuyện với tôi. Tôi sẽ lắng nghe và trả lời bằng tiếng Việt.</p>
            </div>
        </main>

        <!-- Input bar -->
        <div class="input-bar input-col">
            <!-- Status text -->
            <div class="status-area">
                <p class="status-text" id="status-text">Nhấn giữ mic để bắt đầu nói</p>
                <!-- Live transcript while recording -->
                <p class="live-transcript" id="live-transcript"></p>
            </div>
            
            <div class="controls">
                <!-- Mic button -->
                <div class="mic-wrapper">
                    <div class="mic-ring" id="mic-ring"></div>
                    <button class="mic-btn" id="mic-btn">
                        <svg class="icon-mic" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                            <line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="8" y1="23" x2="16" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <svg class="icon-stop" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                        </svg>
                    </button>
                </div>
                
                <!-- Text input -->
                <div class="text-input-wrapper">
                    <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." autocomplete="off">
                    <button id="send-btn" class="send-btn" title="Gửi tin nhắn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=1"></script>
</body>
</html>
