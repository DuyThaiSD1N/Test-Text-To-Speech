<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthesize AI - Modern TTS & STT System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header>
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>Synthesize<span>AI</span></h1>
            </div>
            <p class="subtitle">Convert text to speech and speech to text instantly.</p>

            <div class="tab-switcher">
                <button id="tts-tab" class="tab-btn active">Text to Speech</button>
                <button id="stt-tab" class="tab-btn">Speech to Text</button>
            </div>
        </header>

        <!-- TTS Section -->
        <section id="tts-section" class="glass-panel main-panel">
            <div class="input-group">
                <label for="text-input">Your Text</label>
                <textarea id="text-input"
                    placeholder="Type or paste something here... (e.g., Xin chào, tôi là trợ lý ảo thuyanh-north)"></textarea>
            </div>

            <div class="controls">
                <div class="config-info">
                    <span class="badge">Voice: thuyanh-north</span>
                    <span class="badge">Format: 8kHz WAV</span>
                </div>
                <button id="generate-btn" class="primary-btn">
                    <span class="btn-text">Generate Speech</span>
                    <div class="loader"></div>
                </button>
            </div>

            <div id="tts-result" class="result-area hidden">
                <div class="audio-container">
                    <audio id="audio-player" controls></audio>
                    <a id="download-link" class="secondary-btn" download="speech.wav">Download WAV</a>
                </div>
            </div>
        </section>

        <!-- STT Section -->
        <section id="stt-section" class="glass-panel main-panel hidden-section">
            <div class="stt-container">
                <div class="record-visual">
                    <div id="record-ring" class="record-ring"></div>
                    <button id="record-btn" class="record-btn">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" fill="currentColor" />
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                            <line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                            <line x1="8" y1="23" x2="16" y2="23" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
                <p id="record-status" class="record-status">Click mic to start recording</p>

                <div class="transcript-area">
                    <label>Transcription Result</label>
                    <div id="transcript-result" class="transcript-box">
                        <span class="placeholder">Your speech will appear here...</span>
                    </div>
                </div>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 SynthesizeAI. Powered by Advanced Speech Tech.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
